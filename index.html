    <style>
/* =========================================================
   🌤️ APPLE LIQUID GLASS LIGHT MODE  — v2 FULL FIX
   Toggle class: body.light-mode
========================================================= */

/* ── VARIABLES ─────────────────────────────────────────── */
body.light-mode {
  --lm-bg-grad: #ffffff;
  --lm-card:    rgba(255,255,255,1.00);
  --lm-card-border: rgba(255,255,255,0.88);
  --lm-card-shadow: 0 8px 32px rgba(50,80,130,0.10), 0 2px 6px rgba(50,80,130,0.06);
  --lm-glass-bg:    rgba(255,255,255,0.95);
  --lm-glass-border: rgba(255,255,255,0.82);
  --lm-text-main:   #0f172a;
  --lm-text-sub:    #1e3a5f;
  --lm-text-muted:  #5a7aa8;
  --lm-accent:      #1d4ed8;
  --lm-header-bg:   rgba(240,248,255,0.82);
  --lm-header-border: rgba(180,210,240,0.55);
  --lm-input-bg:    rgba(255,255,255,0.70);
  --lm-table-head:  rgba(219,234,254,0.90);
  --lm-table-hover: rgba(214,230,253,0.65);
  --lm-separator:   rgba(180,205,240,0.40);
  --lm-scrolltrack: #cddcee;
  --lm-scrollthumb: #8aafd4;
}

/* ── BASE ──────────────────────────────────────────────── */
body.light-mode {
  background: var(--lm-bg-grad) !important;
  background-attachment: fixed !important;
  color: var(--lm-text-main) !important;
  font-family: 'Sarabun', sans-serif !important;
}

/* ── HEADER ────────────────────────────────────────────── */
body.light-mode header,
body.light-mode .bg-white.shadow {
  background: var(--lm-header-bg) !important;
  backdrop-filter: blur(24px) saturate(170%) !important;
  -webkit-backdrop-filter: blur(24px) saturate(170%) !important;
  border-bottom: 1px solid var(--lm-header-border) !important;
  box-shadow: 0 2px 20px rgba(40,70,130,0.09) !important;
}

/* ── CARDS & PANELS ────────────────────────────────────── */
body.light-mode .bg-white,
body.light-mode .netflix-card,
body.light-mode .rounded-xl,
body.light-mode [class*="card"] {
  background: var(--lm-card) !important;
  backdrop-filter: blur(18px) saturate(160%) !important;
  -webkit-backdrop-filter: blur(18px) saturate(160%) !important;
  border: 1px solid var(--lm-card-border) !important;
  box-shadow: var(--lm-card-shadow) !important;
  color: var(--lm-text-main) !important;
}

/* hover lift */
body.light-mode .rounded-xl:hover:not(.critical-card) {
  box-shadow: 0 14px 44px rgba(29,78,216,0.13), 0 3px 10px rgba(29,78,216,0.08) !important;
  transform: translateY(-2px);
  transition: all 0.2s ease;
}

/* ── ALL TEXT ──────────────────────────────────────────── */
body.light-mode h1,
body.light-mode h2,
body.light-mode h3,
body.light-mode h4,
body.light-mode .text-gray-900,
body.light-mode .text-gray-800 {
  color: var(--lm-text-main) !important;
}

/* text-white class → dark text in light mode (but NOT when inline style overrides) */
body.light-mode .text-white:not([style*="color"]) {
  color: var(--lm-text-main) !important;
}

body.light-mode .text-gray-600,
body.light-mode .text-gray-500,
body.light-mode .text-gray-400 {
  color: var(--lm-text-muted) !important;
}

/* Paragraphs / spans — targeted to avoid overriding chart SVG */
body.light-mode p { color: var(--lm-text-sub) !important; }
body.light-mode label { color: var(--lm-text-sub) !important; }
body.light-mode span:not(.recharts-legend-item-text):not([class*="recharts"]):not(.jath-focus-btn span) { color: var(--lm-text-sub) !important; }
body.light-mode .jath-focus-btn span,
body.light-mode .jath-focus-btn { color: #ffffff !important; }

/* KPI big numbers */
body.light-mode .text-3xl,
body.light-mode .text-2xl {
  color: var(--lm-text-main) !important;
}

/* ── DASHBOARD BACKGROUND ──────────────────────────────── */
body.light-mode .min-h-screen.bg-gray-50,
body.light-mode .bg-gray-50,
body.light-mode .bg-gray-100,
body.light-mode main.max-w-7xl {
  background: transparent !important;
}

/* ── UPLOAD PAGE ───────────────────────────────────────── */
body.light-mode .min-h-screen.bg-gradient-to-br {
  background: radial-gradient(ellipse at 30% 20%,
    rgba(193,219,255,0.75) 0%,
    rgba(225,238,255,0.65) 55%,
    rgba(205,225,252,0.80) 100%) !important;
  background-attachment: fixed !important;
}

body.light-mode .min-h-screen .bg-white {
  background: var(--lm-glass-bg) !important;
  backdrop-filter: blur(28px) saturate(165%) !important;
  -webkit-backdrop-filter: blur(28px) saturate(165%) !important;
  border: 1px solid var(--lm-glass-border) !important;
  box-shadow: 0 20px 60px rgba(50,100,200,0.13) !important;
}

body.light-mode .min-h-screen label {
  background: rgba(255,255,255,0.50) !important;
  border-color: rgba(160,200,255,0.60) !important;
  color: var(--lm-text-sub) !important;
}

body.light-mode .min-h-screen .text-gray-800,
body.light-mode .min-h-screen .text-gray-500,
body.light-mode .min-h-screen .text-gray-400 {
  color: var(--lm-text-sub) !important;
}

body.light-mode .min-h-screen .bg-blue-100 {
  background: rgba(219,234,254,0.80) !important;
}

body.light-mode .min-h-screen button:not(.lang-btn):not(.theme-toggle-btn):not(.jath-focus-btn) {
  background: rgba(255,255,255,0.60) !important;
  color: var(--lm-text-main) !important;
  border-color: rgba(160,200,245,0.55) !important;
}

/* ── FILTER PANEL ──────────────────────────────────────── */
body.light-mode .netflix-card.rounded-xl {
  background: rgba(255,255,255,0.62) !important;
  backdrop-filter: blur(20px) saturate(160%) !important;
  -webkit-backdrop-filter: blur(20px) saturate(160%) !important;
  border: 1px solid rgba(255,255,255,0.80) !important;
}

body.light-mode .sticky.top-\[72px\] {
  background: transparent !important;
}

/* Filter label fix */
body.light-mode .netflix-card label {
  background-color: transparent !important;
  color: var(--lm-text-sub) !important;
}

/* ── INPUTS / DROPDOWNS ────────────────────────────────── */
body.light-mode select,
body.light-mode input:not([type="file"]):not([type="checkbox"]) {
  background: var(--lm-input-bg) !important;
  backdrop-filter: blur(10px) !important;
  color: var(--lm-text-main) !important;
  border-color: rgba(160,200,240,0.60) !important;
}

/* MultiSelect dropdown panel */
body.light-mode .absolute.z-50,
body.light-mode .absolute.z-10 {
  background: rgba(245,250,255,0.95) !important;
  backdrop-filter: blur(18px) !important;
  border-color: rgba(160,200,240,0.55) !important;
  color: var(--lm-text-main) !important;
}

/* ── LANGUAGE BUTTON GROUP ─────────────────────────────── */
/* Container bg handled via inline style in JSX - no override needed here */

body.light-mode .lang-btn {
  background: transparent !important;
  color: var(--lm-text-muted) !important;
  border: none !important;
  border-radius: 999px !important;
  font-weight: 700;
}

body.light-mode .lang-btn:hover {
  background: rgba(0,122,255,0.10) !important;
  color: var(--lm-text-main) !important;
  border-radius: 999px !important;
}

body.light-mode .lang-btn.active {
  background: var(--lm-accent) !important;
  color: #ffffff !important;
  border-radius: 999px !important;
  border: none !important;
  box-shadow: 0 0 0 1px rgba(29,78,216,0.30), 0 0 12px rgba(29,78,216,0.35) !important;
}

/* ── THEME TOGGLE BUTTON ───────────────────────────────── */
.theme-toggle-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 5px 13px;
  border-radius: 999px;
  font-size: 11px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.22s ease;
  border: 1px solid #2a2a2a;
  background: #1f1f1f;
  color: #9ca3af;
  letter-spacing: 0.02em;
  white-space: nowrap;
  font-family: 'Sarabun', sans-serif;
}

body:not(.light-mode) .theme-toggle-btn:hover {
  background: #2a2a2a !important;
  color: #ffffff !important;
}

body.light-mode .theme-toggle-btn {
  background: rgba(240,248,255,0.65) !important;
  border: 1px solid rgba(180,215,245,0.70) !important;
  color: var(--lm-text-muted) !important;
  backdrop-filter: blur(10px) !important;
}

body.light-mode .theme-toggle-btn:hover {
  background: rgba(255,255,255,0.88) !important;
  color: var(--lm-text-main) !important;
}

/* Sun / Moon icons */
.theme-icon-sun  { display: none; }
.theme-icon-moon { display: inline; }

body.light-mode .theme-icon-sun  { display: inline; }
body.light-mode .theme-icon-moon { display: none; }

/* ── ICON ACCENT BOXES ─────────────────────────────────── */
body.light-mode .bg-blue-600 {
  background: rgba(219,234,254,0.85) !important;
}

body.light-mode .bg-\[#2a2a2a\],
body.light-mode .bg-\[#2a2a2a\].p-4 {
  background: rgba(219,234,254,0.80) !important;
  color: var(--lm-accent) !important;
}

body.light-mode .text-\[#E50914\] { color: #dc2626 !important; }
body.light-mode .text-blue-500 { color: #3b82f6 !important; }

/* Filter icon: blue in light mode, red in dark mode */
body:not(.light-mode) .text-blue-500 { color: #E50914 !important; }
body.light-mode .text-blue-600,
body.light-mode .text-blue-700 { color: var(--lm-accent) !important; }

/* Focus mode button – blue in light mode */
body.light-mode button.jath-focus-btn {
  background: #1d4ed8 !important;
  color: #fff !important;
  border-color: #1d4ed8 !important;
  box-shadow: 0 0 10px rgba(29,78,216,0.35) !important;
}

/* Reset / misc buttons */
body.light-mode .text-gray-400.hover\:text-red-500 {
  color: var(--lm-text-muted) !important;
}

/* ── TABLES ────────────────────────────────────────────── */
body.light-mode table {
  color: var(--lm-text-sub) !important;
}

body.light-mode thead {
  background: var(--lm-table-head) !important;
}

body.light-mode th,
body.light-mode th.sticky {
  background: var(--lm-table-head) !important;
  color: var(--lm-text-main) !important;
  border-color: rgba(180,210,240,0.40) !important;
}

body.light-mode td {
  color: var(--lm-text-sub) !important;
  border-color: var(--lm-separator) !important;
}

body.light-mode td.sticky,
body.light-mode .bg-white.hover\:bg-blue-50 {
  background: rgba(245,251,255,0.92) !important;
  backdrop-filter: blur(10px) !important;
  color: var(--lm-text-main) !important;
}

body.light-mode tbody tr:hover {
  background: var(--lm-table-hover) !important;
}

/* Table header area */
body.light-mode .p-5.border-b.flex.justify-between {
  background: rgba(230,240,255,0.70) !important;
  border-color: rgba(180,210,240,0.40) !important;
}

body.light-mode .px-3.py-1.rounded.border {
  background: rgba(255,255,255,0.80) !important;
  color: var(--lm-text-sub) !important;
  border-color: rgba(180,210,240,0.55) !important;
}

/* BD.TIME column – keep blue accent but visible */
body.light-mode .text-blue-600 { color: #1d4ed8 !important; }

/* ── CHART GRID & AXES ─────────────────────────────────── */
body.light-mode .recharts-cartesian-axis-tick text,
body.light-mode .recharts-text { fill: var(--lm-text-sub) !important; }

body.light-mode .recharts-legend-item-text { color: var(--lm-text-sub) !important; }

body.light-mode .recharts-cartesian-grid line {
  stroke: rgba(160,195,235,0.45) !important;
}

body.light-mode .recharts-label { fill: var(--lm-text-sub) !important; }

/* ── SCROLLBAR ─────────────────────────────────────────── */
body.light-mode ::-webkit-scrollbar-track { background: var(--lm-scrolltrack) !important; }
body.light-mode ::-webkit-scrollbar-thumb { background: var(--lm-scrollthumb) !important; }
body.light-mode ::-webkit-scrollbar-thumb:hover { background: #5e8fbe !important; }

/* ── BORDER ACCENTS ────────────────────────────────────── */
body.light-mode .border-l-4 {
  box-shadow: 0 0 0 1px rgba(29,78,216,0.10), 0 4px 14px rgba(29,78,216,0.09) !important;
}

body.light-mode .border-gray-200,
body.light-mode .border-gray-100,
body.light-mode .border-\[#2a2a2a\] {
  border-color: rgba(180,210,240,0.40) !important;
}

/* hover bg rows */
body.light-mode .hover\:bg-gray-50:hover,
body.light-mode .hover\:bg-blue-50:hover {
  background: rgba(214,230,255,0.55) !important;
}

/* ── STATUS LEGEND DOTS keep color ─────────────────────── */
body.light-mode .text-green-600 { color: #16a34a !important; }
body.light-mode .text-amber-500 { color: #d97706 !important; }
body.light-mode .text-red-500   { color: #dc2626 !important; }

/* ── CRITICAL CARD (stays alarming in light mode) ──────── */
body.light-mode .critical-card {
  background: radial-gradient(circle at top left,
    rgba(0,122,255,0.15),
    rgba(240,247,255,0.97) 65%) !important;
  border-left: 6px solid #007AFF !important;
  border-color: rgba(0,122,255,0.25) !important;
  box-shadow:
    0 0 0 1px rgba(0,122,255,0.18),
    0 0 22px rgba(0,122,255,0.25),
    inset 0 0 18px rgba(0,122,255,0.08) !important;
}

body.light-mode .critical-card *:not(b):not(.critical-badge),
body.light-mode .critical-card h3,
body.light-mode .critical-card span:not(.critical-badge),
body.light-mode .critical-card p {
  color: #1e3a5f !important;
}

body.light-mode .critical-card b {
  color: #dc2626 !important;
}

body.light-mode .critical-badge {
  background: #007AFF !important;
  color: #fff !important;
}

/* ── JATH FOCUS MODE (keep dark) ───────────────────────── */
body.light-mode.jath-mode {
  background: radial-gradient(circle at top,
    #1a0000 0%, #141414 45%, #0f0f0f 100%) !important;
}

/* JATH machine cards in light mode */
body.light-mode.jath-mode .bg-white,
body.light-mode.jath-mode .netflix-card,
body.light-mode.jath-mode .rounded-xl {
  background: #1f1f1f !important;
  color: #e5e5e5 !important;
  border-color: #2a2a2a !important;
  backdrop-filter: none !important;
}

body.light-mode.jath-mode h1,
body.light-mode.jath-mode h2,
body.light-mode.jath-mode h3,
body.light-mode.jath-mode span:not([class*="recharts"]),
body.light-mode.jath-mode p {
  color: #e5e5e5 !important;
}

/* JATH machine rank numbers & names */
body.light-mode.jath-mode .text-\[#E50914\],
body.light-mode.jath-mode .text-red-500 { color: #ff4d4d !important; }

body.light-mode.jath-mode .text-gray-400,
body.light-mode.jath-mode .text-gray-500 { color: #9ca3af !important; }

/* JATH donut center text */
body.light-mode.jath-mode .text-white { color: #ffffff !important; }

/* ── MULTISELECT DROPDOWN TEXT ─────────────────────────── */
body.light-mode .text-gray-700 { color: var(--lm-text-sub) !important; }
body.light-mode .truncate { color: var(--lm-text-sub) !important; }

/* ── JATH inner panels - force dark text colors even in light-mode ── */
body.light-mode.jath-mode .text-gray-400,
body.light-mode.jath-mode .text-gray-300,
body.light-mode.jath-mode .text-gray-500 { color: #9ca3af !important; }

body.light-mode.jath-mode .text-white,
body.light-mode.jath-mode [class*="text-base font-semibold"] { color: #f1f5f9 !important; }

body.light-mode.jath-mode .text-\[#E50914\] { color: #ff4444 !important; }
body.light-mode.jath-mode .text-\[#F59E0B\] { color: #fbbf24 !important; }
body.light-mode.jath-mode .text-\[#6366F1\] { color: #818cf8 !important; }
body.light-mode.jath-mode .text-\[#10B981\] { color: #34d399 !important; }

/* Also ensure bg-[#2a2a2a] icon circles in JATH stay dark */
body.light-mode.jath-mode .bg-\[#2a2a2a\] { background: #2a2a2a !important; }

/* ── LIGHT MODE FOCUS MODE TEXT READABILITY ─────────────── */
/* Make inline-styled dark text readable in light mode */
body.light-mode.jath-mode [style*="color:#9ca3af"],
body.light-mode.jath-mode [style*="color: #9ca3af"] {
  color: #374151 !important;
}
body.light-mode.jath-mode [style*="color:#cbd5e1"],
body.light-mode.jath-mode [style*="color: #cbd5e1"] {
  color: #1e293b !important;
}
body.light-mode.jath-mode [style*="color:#f1f5f9"],
body.light-mode.jath-mode [style*="color: #f1f5f9"] {
  color: #0f172a !important;
}
body.light-mode.jath-mode [style*="color:#fca5a5"],
body.light-mode.jath-mode [style*="color: #fca5a5"] {
  color: #b91c1c !important;
}
body.light-mode.jath-mode [style*="color:#64748b"],
body.light-mode.jath-mode [style*="color: #64748b"] {
  color: #475569 !important;
}
body.light-mode.jath-mode [style*="color:#6b7280"],
body.light-mode.jath-mode [style*="color: #6b7280"] {
  color: #374151 !important;
}

/* ── FILTER "Filters" heading ──────────────────────────── */
/* text-white in filter heading → dark */
body.light-mode .netflix-card .text-white { color: var(--lm-text-main) !important; }

/* ── MISC fixes ────────────────────────────────────────── */
body.light-mode .bg-gray-100 { background: #f9fafb !important; }
body.light-mode .shadow-sm { box-shadow: var(--lm-card-shadow) !important; }

/* ═══ HAMBURGER MENU ═══ */
.hamburger-menu-backdrop {
  transition: opacity 0.3s ease;
}
.hamburger-sidebar {
  transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
}
.hamburger-sidebar button:hover {
  filter: brightness(1.1);
}
body.light-mode .hamburger-sidebar button:hover {
  background: rgba(29,78,216,0.08) !important;
}
body:not(.light-mode) .hamburger-sidebar button:hover {
  background: rgba(229,9,20,0.12) !important;
}

   <style>
/* ===== NETFLIX DARK DASHBOARD (UI ONLY) ===== */
:root {
  --bg-main: #0b0b0b;
  --bg-card: #181818;
  --bg-soft: #222;
  --border-soft: #2a2a2a;
  --text-main: #e5e5e5;
  --text-muted: #9ca3af;
  --accent-red: #e50914;
}

body {
  background: linear-gradient(180deg, #0b0b0b, #141414);
  color: var(--text-main);
  font-family: 'Sarabun', sans-serif;
}
body:not(.light-mode) .hover\:bg-gray-50:hover {
  background: #1f1f1f !important;
}

/* Header */
header {
  backdrop-filter: blur(8px);
}

/* Card */
body:not(.light-mode) .bg-white {
  background-color: var(--bg-card) !important;
  border-radius: 16px !important;
}

body:not(.light-mode) .border-gray-200,
body:not(.light-mode) .border-gray-100 {
  border-color: var(--border-soft) !important;
}

.shadow-sm:hover {
  transform: translateY(-2px);
  transition: all 0.25s ease;
}

/* Text */
body:not(.light-mode) .text-gray-900,
body:not(.light-mode) .text-gray-800 {
  color: #ffffff !important;
}

body:not(.light-mode) .text-gray-600,
body:not(.light-mode) .text-gray-500,
body:not(.light-mode) .text-gray-400 {
  color: var(--text-muted) !important;
}

/* Buttons / Accent */
body:not(.light-mode) .bg-blue-600 {
  background-color: var(--accent-red) !important;
}

body:not(.light-mode) .text-blue-600 {
  color: var(--accent-red) !important;
}

/* Inputs */
body:not(.light-mode) input,
body:not(.light-mode) select,
body:not(.light-mode) .bg-gray-100 {
  background: var(--bg-soft) !important;
  color: var(--text-main) !important;
  border-color: var(--border-soft) !important;
}

/* Scrollbar */
.custom-scrollbar::-webkit-scrollbar {
  width: 8px;
  height: 8px;
}
.custom-scrollbar::-webkit-scrollbar-track {
  background: #111;
}
.custom-scrollbar::-webkit-scrollbar-thumb {
  background: #333;
  border-radius: 6px;
}

/* ── Interactive Chart Hints (Power BI style) ─────────────── */
.jath-chart-interactive {
  position: relative;
}
.jath-chart-interactive::after {
  content: '🖱 Click to filter';
  position: absolute;
  top: 10px; right: 14px;
  font-size: 10px;

        const parseCSV = (text) => {
            const rows = [];
            let currentRow = [];
            let currentCell = '';
            let inQuotes = false;

            for (let i = 0; i < text.length; i++) {
                const char = text[i];
                const nextChar = text[i + 1];

                if (char === '"') {
                if (inQuotes && nextChar === '"') {
                    currentCell += '"';
                    i++;
                } else {
                    inQuotes = !inQuotes;
                }
                } else if (char === ',' && !inQuotes) {
                currentRow.push(currentCell.trim());
                currentCell = '';
                } else if ((char === '\r' || char === '\n') && !inQuotes) {
                if (currentCell || currentRow.length > 0) {
                    currentRow.push(currentCell.trim());
                    rows.push(currentRow);
                    currentRow = [];
                    currentCell = '';
                }
                if (char === '\r' && nextChar === '\n') i++;
                } else {
                currentCell += char;
                }
            }
            if (currentCell || currentRow.length > 0) {
                currentRow.push(currentCell.trim());
                rows.push(currentRow);
            }
            return rows;
        };

const renderParetoTick = ({ x, y, payload }) => {
  const text = payload?.value || '';
  const isLt = document.body.classList.contains('light-mode');
  const mobile = window.innerWidth < 640;

  // แยกบรรทัด
  const wrapText = (str, maxLen) => {
    const words = str.split(' ');
    const lines = [];
    let current = '';
    words.forEach(w => {
      if ((current + ' ' + w).trim().length <= maxLen) {
        current = current ? current + ' ' + w : w;
      } else {
        if (current) lines.push(current);
        current = w;
      }
    });
    if (current) lines.push(current);
    return lines;
  };

  // mobile: ตัดสั้นลงอีก ให้แต่ละบรรทัดสั้น + font เล็กลง
  const maxLen   = mobile ? 10 : 20;
  const fontSize = mobile ? 9  : 11;
  const lineH    = mobile ? 11 : 14;
  const maxLines = mobile ? 3  : 99; // จำกัดแค่ 3 บรรทัดบน mobile
  let lines = wrapText(text, maxLen);
  if (mobile && lines.length > maxLines) {
    lines = lines.slice(0, maxLines);
    lines[maxLines - 1] = lines[maxLines - 1].slice(0, 8) + '…';
  }

  return (
    <g transform={`translate(${x},${y}) rotate(-45)`}>
      <text
        textAnchor="end"
        fontSize={fontSize}
        fill={isLt ? '#334155' : '#e5e7eb'}
      >
        {lines.map((line, i) => (
          <tspan
            key={i}
            x="0"
            dy={i === 0 ? 0 : lineH}
          >
            {line}
          </tspan>
        ))}
      </text>
    </g>
  );
};

const mtbfTotalByMonth = useMemo(() => {
  const MTBF_MACHINING = ['Rack Machining','Nut Machining','Pinion Machining','Sensor Assy','Input Shaft Assy'];
  const MTBF_ASSY_LINES = ['Gear Assy'];
  const ASSY_LINE_GROUP = ['Gear Assy','Gear Sub-Assy','Housing Assy No.1','Housing Assy No.2','Pulley Sub-Assy','Rack Sub-Assy'];
  const ALL_MTBF_LINES = [...MTBF_MACHINING, ...MTBF_ASSY_LINES];

  if (operationData.length === 0) return [];

  const mtbfSource = applyAllFilters(rawData, { skip: ['month', 'chartMonth', 'chartLine', 'line'] });

  // bdMap: month|line|machineNo → count
  const bdMap = {};
  mtbfSource.forEach(d => {
    const lineKey = ASSY_LINE_GROUP.includes(d.lineName) ? 'Gear Assy' : d.lineName;
    if (!ALL_MTBF_LINES.includes(lineKey)) return;
    const key = `${d.month}|${lineKey}|${d.machineNo}`;
    bdMap[key] = (bdMap[key] || 0) + 1;
  });

  // opMap: month|line → { opTime, machineCount }
  const opMap = {};
  operationData.forEach(o => {
    const lineKey = ASSY_LINE_GROUP.includes(o.lineName) ? 'Gear Assy' : o.lineName;
    if (!ALL_MTBF_LINES.includes(lineKey)) return;
    const key = `${o.month}|${lineKey}`;
    if (!opMap[key]) opMap[key] = { opTime: o.opTime, machineCount: Number(o.machineCount || 0) };
  });

  // mlCounts: month|line → { machineNo: count }
  const mlCounts = {};
  Object.entries(bdMap).forEach(([key, count]) => {
    const [month, line, machine] = key.split('|');
    const mlKey = `${month}|${line}`;
    if (!mlCounts[mlKey]) mlCounts[mlKey] = {};
    mlCounts[mlKey][machine] = count;
  });

  const calcGroupMtbf = (month, lines) => {
    let sumWeighted = 0, sumMc = 0;
    lines.forEach(line => {
      const mlKey = `${month}|${line}`;
      const opInfo = opMap[mlKey];
      if (!opInfo || opInfo.opTime === 0) return;
      const mc = opInfo.machineCount;
      const machineCounts = mlCounts[mlKey] || {};
      const mv = Object.values(machineCounts);
      const case1 = mv.filter(c => c === 1).length;
      const case2 = mv.filter(c => c > 1).reduce((s, c) => s + c, 0);
      const case3 = Math.max(mc - mv.length, 0);
      const divisor = case1 + case2 + case3 > 0 ? case1 + case2 + case3 : mc;
      const mtbf_hr = (opInfo.opTime / divisor) / 60;
      sumWeighted += mtbf_hr * mc;
      sumMc += mc;
    });
    return sumMc > 0 ? +(sumWeighted / sumMc).toFixed(2) : 0;
  };

  const activeMonthsTotal = chartClickMonth
    ? [chartClickMonth]
    : selectedMonths.length > 0 ? selectedMonths : uniqueMonths;
  return activeMonthsTotal.map(month => ({
    month,
    mtbfMachining: calcGroupMtbf(month, MTBF_MACHINING),
    mtbfAssy:      calcGroupMtbf(month, MTBF_ASSY_LINES),
  })).sort((a, b) => parseMonth(a.month) - parseMonth(b.month));
}, [rawData, applyAllFilters, operationData, selectedMonths, chartClickMonth]);

  const radius = outerRadius * 0.6;

  const y = cy + radius * Math.sin(-midAngle * RADIAN);

  return (
    <text

  y={y}

  dominantBaseline="central"
  fontSize={13}
  fontWeight="600"
>

};

// Small reusable donut chart for focus panels with center label
const FocusDonut = ({ data, valueKey = 'value', colors, unit = '' }) => {
  if (!data || data.length === 0) return null;

  const total = data.reduce((s, d) => s + (d[valueKey] || 0), 0);
  const top = data[0]?.[valueKey] || 0;
  const percent = total > 0 ? Math.round((top / total) * 100) : 0;

  return (
    <div className="relative h-36 w-36 mx-auto">
      <ResponsiveContainer>
        <PieChart>
          <Pie
            data={data}
            dataKey={valueKey}
            cx="50%"
            cy="50%"
            innerRadius={46}
            outerRadius={68}
            stroke="none"
            cornerRadius={6}
          >
            {data.map((_, i) => (
              <Cell key={i} fill={colors[i % colors.length]} />
            ))}
          </Pie>
        </PieChart>
      </ResponsiveContainer>

      {/* CENTER LABEL */}
      <div className="absolute inset-0 flex flex-col items-center justify-center pointer-events-none">
        <div className="text-2xl font-extrabold tracking-tight leading-none" style={{color:'#ffffff'}}>
          {unit === '%' ? `${percent}%` : Number.isInteger(top) || top >= 10 ? Math.round(top) : top.toFixed(2)}
        </div>
        <div className="mt-1 text-[11px] uppercase tracking-widest" style={{color:'#9ca3af'}}>
          {unit === '%' ? 'Top Share' : unit}
        </div>
      </div>
    </div>
  );
};

  const focusStatusRCOpts  = React.useMemo(() => [...new Set(filteredData.map(d => (d.statusRC||'').trim()).filter(Boolean))].sort(), [filteredData]);

  // --- Top 5 machines (respects focus filters) ---
  const focusTop5Machines = React.useMemo(() => {
    let base = filteredData;
    if (focusStatusRC.length > 0) base = base.filter(d => focusStatusRC.includes((d.statusRC||'').trim()));
    if (focusLine.length > 0)     base = base.filter(d => focusLine.includes(d.lineName));

    const map = {};

      if (!map[d.machineNo]) map[d.machineNo] = { machineNo: d.machineNo, line: d.lineName, downtime: 0, count: 0 };
      map[d.machineNo].downtime += d.bdTime;
      map[d.machineNo].count += 1;

    return Object.values(map)
